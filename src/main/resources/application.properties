# application.properties -> arquivo de configuracao do Spring Boot.
# Aqui dizemos como conectar no banco, e ligamos algumas ferramentas auxiliares.

# Nome da aplicacao (apenas informativo, aparece nos logs)
spring.application.name=OOP2

# --- Configuracao do banco H2 em memoria ---
# jdbc:h2:mem:livrosdb -> cria um banco chamado "livrosdb" que vive somente na RAM.
# Quando a aplicacao para, o banco e todo o seu conteudo desaparecem.
spring.datasource.url=jdbc:h2:mem:livrosdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- Configuracao do Hibernate/JPA ---
# ddl-auto=update -> o Hibernate cria/atualiza automaticamente as tabelas
# com base nas nossas classes @Entity (ex: a classe Livro gera a tabela LIVRO)
spring.jpa.hibernate.ddl-auto=update

# Mostra no console os comandos SQL que o Hibernate esta executando.
# Util para estudar e debugar, pode deixar "false" se quiser um log mais limpo.
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Dialeto especifico do H2, ajuda o Hibernate a gerar SQL compativel
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# --- Console web do H2 ---
# Habilita uma interface visual (no navegador) para ver as tabelas e dados do banco.
# Depois de rodar a aplicacao, acesse: http://localhost:8080/h2-console
# JDBC URL para colar na tela de login do console: jdbc:h2:mem:livrosdb
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
